openapi: 3.0.3
info:
  title: API Docs
  version: 1.0.0
paths:
  /api/user/signup/:
    post:
      operationId: user_signup_create
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSignUpRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserSignUpRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserSignUpRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSignUp'
          description: ''
  /api/user/signin/:
    post:
      operationId: user_signin_create
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSignInRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserSignInRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserSignInRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSignIn'
          description: ''
  /api/user/token/refresh/:
    post:
      operationId: user_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/user/profile/:
    get:
      operationId: user_profile_retrieve
      tags:
      - user
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: user_profile_partial_update
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/user/password/update/:
    post:
      operationId: user_password_update_create
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/user/password-reset/request/:
    post:
      operationId: user_password_reset_request_create
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequest'
          description: ''
  /api/user/password-reset/confirm/:
    post:
      operationId: user_password_reset_confirm_create
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /api/user/contact/:
    post:
      operationId: user_contact_create
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactFormRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ContactFormRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContactFormRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactForm'
          description: ''
  /api/user/newsletter/subscribe/:
    post:
      operationId: user_newsletter_subscribe_create
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsletterSubscriptionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NewsletterSubscriptionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NewsletterSubscriptionRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsletterSubscription'
          description: ''
  /api/document/upload/:
    post:
      operationId: document_upload_create
      description: Upload a PDF file and extract its text content.
      tags:
      - document
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
          description: ''
  /api/document/chat/:
    post:
      operationId: document_chat_create
      description: Ask questions about a document's content using AI.
      tags:
      - document
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentChatRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentChatRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentChatRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentChatResponse'
          description: ''
  /api/document/summary/:
    post:
      operationId: document_summary_create
      description: Generate a concise professional summary of document text.
      tags:
      - document
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSummaryResponse'
          description: ''
  /api/document/flashcards/:
    post:
      operationId: document_flashcards_create
      description: Generate study flashcards from document content.
      tags:
      - document
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentFlashcardsResponse'
          description: ''
  /api/document/quiz/:
    post:
      operationId: document_quiz_create
      description: Generate multiple-choice quizzes from document content.
      tags:
      - document
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentSummaryRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentQuizResponse'
          description: ''
components:
  schemas:
    ContactForm:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        subject:
          type: string
          maxLength: 255
        message:
          type: string
        submitted_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - email
      - id
      - message
      - name
      - subject
      - submitted_at
    ContactFormRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
        phone:
          type: string
          maxLength: 30
        subject:
          type: string
          minLength: 1
          maxLength: 255
        message:
          type: string
          minLength: 1
      required:
      - email
      - message
      - name
      - subject
    DocumentChatRequest:
      type: object
      properties:
        document_text:
          type: string
          minLength: 1
        question:
          type: string
          minLength: 1
      required:
      - document_text
      - question
    DocumentChatResponse:
      type: object
      properties:
        answer:
          type: string
      required:
      - answer
    DocumentFlashcardsResponse:
      type: object
      properties:
        flashcards:
          type: array
          items:
            $ref: '#/components/schemas/Flashcard'
      required:
      - flashcards
    DocumentQuizResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestion'
      required:
      - questions
    DocumentSummaryRequest:
      type: object
      properties:
        document_text:
          type: string
          minLength: 1
      required:
      - document_text
    DocumentSummaryResponse:
      type: object
      properties:
        summary:
          type: string
      required:
      - summary
    DocumentUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
      - file
    DocumentUploadResponse:
      type: object
      properties:
        message:
          type: string
        text:
          type: string
        page_count:
          type: integer
      required:
      - message
      - page_count
      - text
    Flashcard:
      type: object
      properties:
        front:
          type: string
        back:
          type: string
      required:
      - back
      - front
    NewsletterSubscription:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
      required:
      - email
    NewsletterSubscriptionRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
      required:
      - email
    PasswordResetConfirm:
      type: object
      properties:
        uidb64:
          type: string
          maxLength: 100
        token:
          type: string
          maxLength: 100
      required:
      - token
      - uidb64
    PasswordResetConfirmRequest:
      type: object
      properties:
        uidb64:
          type: string
          minLength: 1
          maxLength: 100
        token:
          type: string
          minLength: 1
          maxLength: 100
        new_password:
          type: string
          writeOnly: true
          minLength: 1
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - confirm_password
      - new_password
      - token
      - uidb64
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
      required:
      - email
    PasswordResetRequestRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
      required:
      - email
    PatchedUserProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        image:
          type: string
          format: binary
          nullable: true
    QuizQuestion:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correct_answer:
          type: string
      required:
      - correct_answer
      - options
      - question
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
      required:
      - access
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - refresh
    UpdatePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 1
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - confirm_password
      - new_password
      - old_password
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        name:
          type: string
          maxLength: 255
        image:
          type: string
          format: uri
          nullable: true
      required:
      - email
      - id
      - name
    UserSignIn:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
      required:
      - email
    UserSignInRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
        password:
          type: string
          writeOnly: true
          minLength: 1
          maxLength: 128
      required:
      - email
      - password
    UserSignUp:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        image:
          type: string
          format: uri
          nullable: true
      required:
      - email
      - name
    UserSignUpRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 255
        image:
          type: string
          format: binary
          nullable: true
        password:
          type: string
          writeOnly: true
          minLength: 1
          maxLength: 128
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - confirm_password
      - email
      - name
      - password
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
