name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      BACKEND_DIR: backend
      FRONTEND_DIR: frontend

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Backend dependency install
      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Backend lint (non-blocking)
      - name: Backend lint
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          pip install flake8
          flake8 . || true

      # 5️⃣ Backend tests (non-blocking)
      - name: Backend tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          pip install pytest
          pytest || true

      # 6️⃣ Set up Node.js
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 7️⃣ Frontend install dependencies
      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm install

      # 8️⃣ Frontend build
      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build
